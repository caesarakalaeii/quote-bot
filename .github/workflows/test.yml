name: Test and Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Validate setup
      run: |
        python validate_setup.py
        
    - name: Test configuration loading
      env:
        DISCORD_TOKEN: test_token_placeholder
        DB_PASSWORD: testpassword
        DB_HOST: localhost
        DB_USER: testuser
        DB_NAME: testdb
      run: |
        python -c "
        from config import Config
        try:
            Config.validate()
            print('✅ Configuration validation passed')
        except Exception as e:
            print(f'❌ Configuration validation failed: {e}')
            exit(1)
        "
        
    - name: Test database connection (dry run)
      env:
        DB_PASSWORD: testpassword
        DB_HOST: localhost
        DB_USER: testuser
        DB_NAME: testdb
      run: |
        python -c "
        try:
            from database import Database
            # Don't actually connect, just test import and class structure
            db_class = Database
            print('✅ Database module loads successfully')
        except Exception as e:
            print(f'❌ Database module test failed: {e}')
            exit(1)
        "